name: verify-codegen

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'api/openapi.yaml'
      - 'pkg/client/**'
      - 'internal/api/spec/openapi.yaml'
      - 'tools.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/verify-codegen.yml'

permissions:
  contents: read

jobs:
  verify:
    name: regenerate and diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: true

      - name: regenerate
        run: make gen

      - name: detect drift
        run: |
          if ! git diff --exit-code -- pkg/client internal/api/spec/openapi.yaml; then
            echo ""
            echo "::error::Generated code is out of sync with api/openapi.yaml."
            echo "::error::Run 'make gen' locally and commit the result."
            exit 1
          fi
