# OpenSSF Scorecard supply-chain security scan.
# Publishes SARIF to the Security tab and feeds the README badge at
# https://api.securityscorecards.dev/projects/github.com/JoshuaMart/websec0/badge.
name: Scorecard

on:
  push:
    branches: [main]
  branch_protection_rule:
  schedule:
    # Weekly run keeps the badge current independently of pushes.
    - cron: '34 3 * * 1'

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Required to upload SARIF results to GitHub code-scanning.
      security-events: write
      # Required for OIDC publication to the Scorecard API.
      id-token: write
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact (raw SARIF)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 7

      - name: Upload SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3
        with:
          sarif_file: results.sarif
