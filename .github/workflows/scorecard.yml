# OpenSSF Scorecard supply-chain security scan.
# Publishes SARIF to the Security tab and feeds the README badge at
# https://api.securityscorecards.dev/projects/github.com/JoshuaMart/websec0/badge.
name: Scorecard

on:
  push:
    branches: [main]
  branch_protection_rule:
  schedule:
    # Weekly run keeps the badge current independently of pushes.
    - cron: '34 3 * * 1'

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Required to upload SARIF results to GitHub code-scanning.
      security-events: write
      # Required for OIDC publication to the Scorecard API.
      id-token: write
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact (raw SARIF)
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 7

      - name: Upload SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
