name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub release + upload assets
      packages: write   # push to GHCR
      id-token: write   # cosign keyless OIDC + SLSA provenance
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # goreleaser needs full history for changelog

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

      - uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        id: goreleaser
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: compute artifact hashes for SLSA provenance
        id: hash
        run: |
          hashes=$(base64 -w0 < dist/checksums.txt)
          echo "hashes=$hashes" >> "$GITHUB_OUTPUT"

  # SLSA Level 3 provenance — reusable workflow from slsa-framework
  provenance:
    name: slsa provenance (level 3)
    needs: [goreleaser]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      base64-subjects: ${{ needs.goreleaser.outputs.hashes }}
      upload-assets: true

  # Verify the pushed Docker image is functional and correctly signed
  verify-docker:
    name: verify docker image
    needs: [goreleaser]
    runs-on: ubuntu-latest
    permissions:
      packages: read
    env:
      IMAGE: ghcr.io/joshuamart/websec0:${{ github.ref_name }}
    steps:
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: pull image
        run: docker pull "$IMAGE"

      - name: smoke test — health endpoint
        run: |
          cid=$(docker run -d -p 18080:8080 "$IMAGE")
          for i in $(seq 1 10); do
            status=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:18080/api/v1/health 2>/dev/null || echo "000")
            [ "$status" = "200" ] && break
            sleep 1
          done
          docker stop "$cid"
          [ "$status" = "200" ] || { echo "::error::health check returned $status"; exit 1; }

      - name: verify cosign signature
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/${{ github.ref_name }}" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "$IMAGE"
