version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    # correctness
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # bugs
    - bodyclose
    - copyloopvar
    - errorlint
    - exhaustive
    - nilerr
    - noctx
    - rowserrcheck
    - sqlclosecheck
    # style
    - misspell
    - revive
    - unconvert
    - whitespace
    # perf
    - prealloc
    # security
    - gosec
  settings:
    gosec:
      severity: low
      confidence: low
      excludes:
        - G404
    revive:
      rules:
        - name: var-naming
        - name: package-comments
        - name: error-return
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id
    exhaustive:
      default-signifies-exhaustive: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - bodyclose
          - noctx
      # generated code (ogen, openapi client)
      - path: internal/api/oas/
        linters:
          - revive
          - gosec
          - errcheck
          - unused
      - path: pkg/client/
        linters:
          - revive
          - gosec
          - errcheck
          - unused

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/Jomar/websec101
