# Deliberately weak nginx configuration used by the WebSec0 E2E suite.
# DO NOT copy this for production use. It is wrong on purpose so that
# the scanner has something concrete to flag.
worker_processes 1;
events { worker_connections 64; }

http {
    server_tokens on;          # leak the version (HEADER-INFO-SERVER fail)
    default_type text/html;

    server {
        listen 80;
        server_name _;
        # Intentional: no redirect to HTTPS (TLS-REDIRECT-HTTP-TO-HTTPS fail)
        location / { return 200 "weak fixture\n"; }
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/tls/fixture.crt;
        ssl_certificate_key /etc/nginx/tls/fixture.key;
        # Intentional: no TLSv1.3, allow legacy TLSv1 / TLSv1.1
        ssl_protocols       TLSv1 TLSv1.1 TLSv1.2;
        # Intentional: weak ciphers (RC4, 3DES, no FS suite first)
        ssl_ciphers         "ALL:!aNULL:!MD5";
        ssl_prefer_server_ciphers off;

        # Intentional: NO HSTS, NO CSP, NO XCTO, NO XFO, NO Referrer-Policy
        # No security headers at all. The scanner should flag every one.

        # Expose .git/config — deliberate (EXPOSURE-DOTGIT-CONFIG fail).
        location /.git/ {
            alias /var/www/html/dotgit/;
            autoindex off;
        }

        location / {
            root /var/www/html;
            index index.html;
        }
    }
}
