services:
  legacy-nginx:
    image: nginx:1.18-alpine
    container_name: websec0-legacy-fixture
    ports:
      - "127.0.0.1:18080:80"
      - "127.0.0.1:18443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./tls:/etc/nginx/tls:ro
      - ./www:/var/www/html:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "--no-check-certificate", "https://localhost/"]
      interval: 5s
      timeout: 3s
      retries: 5
