# Deliberately weak Apache HTTPD configuration used by the WebSec0 E2E
# suite. DO NOT copy this for production. It is wrong on purpose so the
# scanner has something concrete to flag.

ServerRoot /usr/local/apache2
PidFile /tmp/httpd.pid
Listen 80
Listen 443

LoadModule mpm_event_module modules/mod_mpm_event.so
LoadModule authn_core_module modules/mod_authn_core.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule unixd_module modules/mod_unixd.so
LoadModule headers_module modules/mod_headers.so
LoadModule alias_module modules/mod_alias.so
LoadModule dir_module modules/mod_dir.so
LoadModule mime_module modules/mod_mime.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule ssl_module modules/mod_ssl.so
LoadModule socache_shmcb_module modules/mod_socache_shmcb.so
LoadModule rewrite_module modules/mod_rewrite.so
LoadModule setenvif_module modules/mod_setenvif.so

ErrorLog /proc/self/fd/2
TransferLog /proc/self/fd/1

# Intentional: full version banner in Server: header (HEADER-INFO-SERVER fail)
ServerTokens Full
# Intentional: server signature on (HTTP-404-DEFAULT-ERROR-PAGE candidate)
ServerSignature On
# Intentional: TRACE enabled (HTTP-TRACE-ENABLED fail)
TraceEnable On

ServerName apache-fixture
ServerAdmin admin@websec0-fixture.invalid

DocumentRoot "/usr/local/apache2/htdocs"

<Directory />
    Options FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>

<Directory "/usr/local/apache2/htdocs">
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

DirectoryIndex index.html

<Files ".ht*">
    Require all denied
</Files>

# Intentional: no redirect to HTTPS on port 80
<VirtualHost *:80>
    DocumentRoot "/usr/local/apache2/htdocs"
</VirtualHost>

# Weak HTTPS vhost.
SSLRandomSeed startup builtin
SSLRandomSeed connect builtin

<VirtualHost *:443>
    DocumentRoot "/usr/local/apache2/htdocs"

    SSLEngine on
    SSLCertificateFile      /usr/local/apache2/conf/tls/fixture.crt
    SSLCertificateKeyFile   /usr/local/apache2/conf/tls/fixture.key

    # Intentional: legacy TLS protocols.
    SSLProtocol             all -SSLv3
    # Intentional: weak/legacy ciphers, server preference off.
    SSLCipherSuite          DEFAULT:!aNULL:!MD5
    SSLHonorCipherOrder     off

    # Intentional: no HSTS, no CSP, no XCTO, no XFO, no Referrer-Policy,
    # no Permissions-Policy, no COOP/COEP/CORP. The scanner should flag
    # every one.

    # Intentional: CORS misconfiguration that triggers two distinct
    # findings:
    #
    #   1. Access-Control-Allow-Origin reflects whatever Origin: arrives
    #      → HTTP-CORS-ORIGIN-REFLECTED (high)
    #   2. Access-Control-Allow-Credentials: true alongside the reflected
    #      origin → HTTP-CORS-WILDCARD-CREDENTIALS path on a wildcard-
    #      equivalent reflection (high; varies by scanner heuristic).
    SetEnvIf Origin "^(.*)$" CORS_ORIGIN=$1
    Header always set Access-Control-Allow-Origin "%{CORS_ORIGIN}e" env=CORS_ORIGIN
    Header always set Access-Control-Allow-Credentials "true"
</VirtualHost>
