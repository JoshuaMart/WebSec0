version: 2

project_name: websec0

before:
  hooks:
    - go mod tidy
    - make frontend

builds:
  - id: websec0
    main: ./cmd/websec0
    binary: websec0
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/JoshuaMart/websec0/internal/version.Version={{.Version}}
      - -X github.com/JoshuaMart/websec0/internal/version.Commit={{.ShortCommit}}
      - -X github.com/JoshuaMart/websec0/internal/version.Date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - websec0.yaml.example

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"
      - Merge pull request
      - Merge branch
